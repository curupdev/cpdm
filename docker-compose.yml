version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: proxy_dns_manager
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-45912}
      - NODE_ENV=production
    volumes:
      # Mount the host SSH directory (Management Node 10.90.135.21) so the Node.js app can securely access nodes without passwords
      - ~/.ssh:/root/.ssh:ro
    network_mode: "host" # Optimal for direct local network access to 10.90.135.x subset

  # NOTE: MariaDB is hosted externally at 10.90.135.80, so it is not included in this stack.
